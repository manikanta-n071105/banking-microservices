spring.application.name=ACCOUNT-SERVICE

server.port=8082

spring.datasource.url=jdbc:postgresql://postgres:5432/bankingdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
#eureka.client.service-url.defaultZone=https://reasonable-grace-production-7cfd.up.railway.app/eureka
eureka.instance.prefer-ip-address=true

customer.service.url=https://customer-service-production-ce21.up.railway.app

eureka.client.service-url.defaultZone=http://service-registry:8761/eureka

spring.config.import=optional:configserver:http://config-server:8888