version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: bankingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  config-server:
    build: ./config-server
    container_name: config-server
    restart: unless-stopped

    ports:
      - "8888:8888"

  service-registry:
    build: ./service-registry
    container_name: service-registry
    restart: unless-stopped

    ports:
      - "8761:8761"

    depends_on:
      - config-server

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      - service-registry

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped

    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "8081:8081"

    depends_on:
      - postgres
      - service-registry

  customer-service:
    build: ./customer-service
    container_name: customer-service
    restart: unless-stopped

    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "8084:8084"

    depends_on:
      - postgres
      - service-registry

  account-service:
    build: ./account-service
    container_name: account-service
    restart: unless-stopped

    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "8082:8082"

    depends_on:
      - postgres
      - service-registry

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    restart: unless-stopped

    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "8083:8083"

    depends_on:
      - postgres
      - service-registry

volumes:
  postgres_data: